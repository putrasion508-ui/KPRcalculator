<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="106" fill="url(#bgGrad)"/>
  
  <!-- Subtle pattern in background -->
  <g opacity="0.08">
    <rect x="60" y="380" width="40" height="60" rx="4" fill="#ffffff"/>
    <rect x="120" y="350" width="40" height="90" rx="4" fill="#ffffff"/>
    <rect x="180" y="310" width="40" height="130" rx="4" fill="#ffffff"/>
    <rect x="240" y="290" width="40" height="150" rx="4" fill="#ffffff"/>
    <rect x="300" y="330" width="40" height="110" rx="4" fill="#ffffff"/>
    <rect x="360" y="360" width="40" height="80" rx="4" fill="#ffffff"/>
    <rect x="420" y="380" width="40" height="60" rx="4" fill="#ffffff"/>
  </g>
  
  <!-- House shape (centered, polished) -->
  <g filter="url(#shadow)">
    <!-- Roof + walls (single path for clean look) -->
    <path d="M 256 100 L 110 220 L 110 380 L 200 380 L 200 280 L 312 280 L 312 380 L 402 380 L 402 220 Z" 
          fill="url(#houseGrad)"/>
    
    <!-- Door arch -->
    <path d="M 256 320 a 28 28 0 0 1 28 28 L 284 380 L 228 380 L 228 348 a 28 28 0 0 1 28 -28 Z" 
          fill="#10b981"/>
    
    <!-- Window left -->
    <rect x="140" y="250" width="48" height="48" rx="6" fill="#10b981"/>
    <line x1="164" y1="250" x2="164" y2="298" stroke="#ffffff" stroke-width="3"/>
    <line x1="140" y1="274" x2="188" y2="274" stroke="#ffffff" stroke-width="3"/>
    
    <!-- Window right -->
    <rect x="324" y="250" width="48" height="48" rx="6" fill="#10b981"/>
    <line x1="348" y1="250" x2="348" y2="298" stroke="#ffffff" stroke-width="3"/>
    <line x1="324" y1="274" x2="372" y2="274" stroke="#ffffff" stroke-width="3"/>
    
    <!-- Percentage badge top-right corner -->
    <circle cx="380" cy="160" r="42" fill="#fbbf24"/>
    <text x="380" y="178" font-family="-apple-system, system-ui, sans-serif" 
          font-size="42" font-weight="900" fill="#ffffff" text-anchor="middle">%</text>
  </g>
  
  <!-- KPR text -->
  <text x="256" y="466" font-family="-apple-system, system-ui, sans-serif" 
        font-size="58" font-weight="800" fill="#ffffff" text-anchor="middle" 
        letter-spacing="4">KPR</text>
</svg>
